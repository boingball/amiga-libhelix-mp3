name: Apply browse queue follow-up
on:
  push:
    branches: [codex/compact-align-miniamp3-gui]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/browse_queue.py
      - run: |
          git diff --check
          grep -q 'queuedInputName' amiga_mp3gui.c
          grep -q 'AslRequestTags(req, ASLFR_Window' amiga_mp3gui.c
          grep -q 'Selected for next Play.' amiga_mp3gui.c
          ! grep -q 'Stop playback before choosing another file.' amiga_mp3gui.c
          ! grep -q 'gadBrowse' amiga_mp3gui.c
      - run: |
          rm -f tools/browse_queue.py .github/workflows/apply-browse-queue.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Allow browsing while playback continues'
          git push origin HEAD:codex/compact-align-miniamp3-gui
