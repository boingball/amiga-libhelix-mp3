name: Apply transport icon forward declaration

on:
  push:
    branches:
      - codex/fix-rapid-play-artwork-race-clean

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply declaration
        run: python3 tools/apply_transport_icon_forward_decl.py
      - name: Validate
        run: |
          git diff --check
          grep -q 'static void DrawTransportIcons(HelixAmp3Gui \*gui);' amiga_mp3gui.c
      - name: Commit source
        run: |
          rm -f tools/apply_transport_icon_forward_decl.py
          rm -f .github/workflows/apply-transport-forward-decl.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Declare transport icon drawer before use'
          git push origin HEAD:codex/fix-rapid-play-artwork-race-clean
