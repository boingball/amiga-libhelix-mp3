name: Apply compact aligned MiniAMP3 GUI update

on:
  push:
    branches:
      - codex/compact-align-miniamp3-gui

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply GUI source update
        run: python3 tools/apply_gui_compact_layout.py

      - name: Validate source changes
        run: |
          git diff --check
          grep -q '#define GUI_WIN_H       310' amiga_mp3gui.c
          grep -q '#define GUI_TOP_Y        8' amiga_mp3gui.c
          grep -q '#define AMIGA' /dev/null || true
          grep -q 'GTSL_Max, 10' amiga_mp3gui.c
          grep -q 'LoadEnvInt("BufferSeconds", 10, 1, 10)' amiga_mp3gui.c
          grep -q 'Selected rate uses standard playback; Superfast disabled.' amiga_mp3gui.c
          test "$(grep -c 'SuperfastRateLabels' amiga_mp3gui.c || true)" -eq 0
          test "$(grep -c 'SuperfastActiveFromRateIndex' amiga_mp3gui.c || true)" -eq 0
          test "$(grep -c 'RateIndexFromSuperfastActive' amiga_mp3gui.c || true)" -eq 0

      - name: Commit GUI source update
        run: |
          rm -f tools/apply_gui_compact_layout.py
          rm -f .github/workflows/apply-gui-compact-layout.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Compact and align MiniAMP3 GUI controls'
          git push origin HEAD:codex/compact-align-miniamp3-gui
