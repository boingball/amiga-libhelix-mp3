name: Apply MiniAMP3 UI polish

on:
  push:
    branches:
      - codex/fix-rapid-play-artwork-race-clean

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply UI polish
        run: python3 tools/apply_cd32_ui_polish.py
      - name: Validate UI polish
        run: |
          git diff --check
          grep -q '#define TRANSPORT_W     48' amiga_mp3gui.c
          grep -q 'static void DrawTransportIcons' amiga_mp3gui.c
          grep -q 'Processing:' amiga_mp3gui.c
          grep -q 'DrawTransportIcons(gui);' amiga_mp3gui.c
      - name: Commit UI polish
        run: |
          rm -f tools/apply_cd32_ui_polish.py
          rm -f .github/workflows/apply-cd32-ui-polish.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Polish MiniAMP3 transport and processing controls'
          git push origin HEAD:codex/fix-rapid-play-artwork-race-clean
