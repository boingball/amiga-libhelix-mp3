name: Apply replay stability and GUI corrections
on:
  push:
    branches: [codex/compact-align-miniamp3-gui]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 tools/apply_replay_gui_fix.py
      - run: |
          git diff --check
          grep -q '#define BROWSE_X        (ART_X - BROWSE_W - 6)' amiga_mp3gui.c
          grep -q 'gui->volumePercent, "%ld%%", 4, 30' amiga_mp3gui.c
          grep -q 'TRANSPORT_W, TRANSPORT_H, ">"' amiga_mp3gui.c
          grep -q 'TRANSPORT_W, TRANSPORT_H, "\[\]"' amiga_mp3gui.c
          grep -q 'Artwork decoding belongs to the GUI task' amiga_mp3gui.c
          grep -q 'Do not reset them again from the GUI task' amiga_mp3gui.c
          test "$(grep -c 'ResetDecoderStatics();' amiga_mp3gui.c)" -eq 1
          test "$(grep -c 'MakeGadgetWithTextAttr(gui, gad,' amiga_mp3gui.c)" -eq 0
      - run: |
          rm -f tools/apply_replay_gui_fix.py .github/workflows/apply-replay-gui-fix.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Stabilize replay and refine MiniAMP3 controls'
          git push origin HEAD:codex/compact-align-miniamp3-gui
