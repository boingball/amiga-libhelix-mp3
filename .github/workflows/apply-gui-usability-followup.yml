name: Apply MiniAMP3 GUI usability follow-up

on:
  push:
    branches:
      - codex/compact-align-miniamp3-gui

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply GUI usability update
        run: python3 tools/apply_gui_usability_followup.py

      - name: Validate source changes
        run: |
          git diff --check
          grep -q '#define GUI_TOP_Y       20' amiga_mp3gui.c
          grep -q '#define GUI_WIN_H       322' amiga_mp3gui.c
          grep -q '#define VOLUME_SLIDER_W BUFFER_SLIDER_W' amiga_mp3gui.c
          grep -q 'GTSL_LevelPlace, PLACETEXT_IN' amiga_mp3gui.c
          grep -q 'PGA_Visible, visible' amiga_mp3gui.c
          grep -q 'Stop playback before choosing another file.' amiga_mp3gui.c
          grep -q 'TRANSPORT_W, TRANSPORT_H, "> PLAY"' amiga_mp3gui.c
          grep -q 'TRANSPORT_W, TRANSPORT_H, "\[\] STOP"' amiga_mp3gui.c
          grep -q 'GA_Disabled, TRUE, TAG_DONE' amiga_mp3gui.c
          grep -q 'GA_Disabled, FALSE, TAG_DONE' amiga_mp3gui.c

      - name: Commit GUI usability update
        run: |
          rm -f tools/apply_gui_usability_followup.py
          rm -f .github/workflows/apply-gui-usability-followup.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Refine MiniAMP3 transport and file selection UX'
          git push origin HEAD:codex/compact-align-miniamp3-gui
