name: Apply interruptible Fast RAM preload fix

on:
  push:
    branches:
      - codex/fix-interruptible-fastmem-stop

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source update
        run: python3 tools/apply_fastmem_stop_fix.py

      - name: Validate update
        run: |
          git diff --check
          grep -q 'FAST_INPUT_PRELOAD_CHUNK' amiga_mp3dec.c
          grep -q 'preloadResult = InputSourcePreloadFastMemory' amiga_mp3dec.c
          test "$(grep -c 'static volatile int gPlaybackInterrupted;' amiga_mp3dec.c)" -eq 1

      - name: Commit source fix
        run: |
          rm -f tools/apply_fastmem_stop_fix.py
          rm -f .github/workflows/apply-fastmem-stop-fix.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Stop during Fast RAM input preload'
          git push origin HEAD:codex/fix-interruptible-fastmem-stop
