name: Apply live playback Stop fix

on:
  push:
    branches:
      - codex/fix-live-playback-stop

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source update
        run: python3 tools/apply_live_stop_fix_v2.py

      - name: Validate update
        run: |
          git diff --check
          grep -q '#define AMIGA_MONO_AUDIO_SLOTS 2' amiga_mp3dec.c
          grep -q '#define AMIGA_AUDIO_PLAYBACK_SLOTS AMIGA_STEREO_DECODE_SLOTS' amiga_mp3dec.c
          test "$(grep -c 'while (produced < .*gPlaybackInterrupted' amiga_mp3dec.c)" -eq 2
          test "$(grep -c 'static int AmigaAudioAbortSent' amiga_mp3dec.c || true)" -eq 0
          grep -q 'Cancel every queued request before waiting for any one request' amiga_mp3dec.c

      - name: Commit source fix
        run: |
          rm -f tools/apply_live_stop_fix.py tools/apply_live_stop_fix_v2.py
          rm -f .github/workflows/apply-live-stop-fix.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Stop during active audio playback'
          git push origin HEAD:codex/fix-live-playback-stop
