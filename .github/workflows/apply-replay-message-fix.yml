name: Apply replay message fix
on:
  push:
    branches:
      - codex/fix-replay-done-message-corruption
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply source change
        run: python3 tools/apply_per_run_done_message.py
      - name: Check source
        run: |
          git diff --check
          grep -q 'struct Message \*doneMsg;' amiga_mp3gui.c
          test "$(grep -c 'gDoneMsg' amiga_mp3gui.c || true)" -eq 0
      - name: Commit source
        run: |
          rm -f tools/apply_per_run_done_message.py
          rm -f .github/workflows/apply-replay-message-fix.yml
          rmdir tools 2>/dev/null || true
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m 'Use a per-run playback completion message'
          git push origin HEAD:codex/fix-replay-done-message-corruption
